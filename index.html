<style>
:root { color-scheme: dark; }
@media (prefers-color-scheme: dark) {
  body { background: #0d1117; color: rgba(255, 255, 255, 0.7); }
  .c0 { background: rgba(255, 255, 255, 0.05); }
  a { color: rgba(255, 255, 255, 0.85); }
  a:hover { color: #fff; }
  .day-cell:hover {
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
  }
}
@media (prefers-color-scheme: light) {
  body { background: #ffffff; color: rgba(0, 0, 0, 0.7); }
  .c0 { background: rgba(0, 0, 0, 0.06); }
  a { color: rgba(0, 0, 0, 0.85); }
  a:hover { color: #000; }
  .day-cell:hover {
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.22);
  }
}
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 24px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  font-family: "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
}
a { text-decoration: none; }
a:hover { text-decoration: underline; }
main {
  max-width: 100%;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 8px 24px;
  padding-bottom: 20px;
}
.scroll {
  overflow-x: auto;
  padding-bottom: 24px;
}
h1 {
  font-weight: 300;
  font-size: 20px;
  letter-spacing: 0.05em;
  margin: 0;
  white-space: nowrap;
}
h2 {
  font-weight: 300;
  font-size: 14px;
  letter-spacing: 0.05em;
  margin: 0;
  white-space: nowrap;
  opacity: 0.6;
}
.grid {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.year-col {
  display: flex;
  flex-direction: column;
}
.label {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.03em;
  padding-bottom: 4px;
  opacity: 0.5;
}
.year {
  display: grid;
  grid-template-columns: repeat(7, 12px);
  grid-auto-rows: 12px;
  gap: 0;
}
.year > div {
  border-radius: 3px;
  padding: 1px;
  background-clip: content-box;
}
.c1 { background: rgba(46, 160, 67, 0.2); }
.c2 { background: rgba(46, 160, 67, 0.4); }
.c3 { background: rgba(46, 160, 67, 0.7); }
.c4 { background: rgba(46, 160, 67, 1.0); }
.day-cell { cursor: default; }
#tip {
  position: fixed;
  z-index: 1080;
  left: 0;
  top: 0;
  max-width: min(280px, calc(100vw - 16px));
  padding: 0.25rem 0.5rem;
  font-size: 0.8125rem;
  font-weight: 400;
  line-height: 1.4;
  color: #fff;
  text-align: center;
  background-color: #212529;
  border-radius: 0.25rem;
  box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.15);
  pointer-events: none;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.12s ease;
}
#tip.show {
  opacity: 1;
  visibility: visible;
}
</style>

<div id="tip" role="tooltip" aria-hidden="true"></div>
<script>
(function () {
  var scroll = document.querySelector('.scroll');
  var grid = document.querySelector('.grid');
  var tip = document.getElementById('tip');
  if (!scroll || !grid || !tip) return;

  function hide() {
    tip.classList.remove('show');
    tip.setAttribute('aria-hidden', 'true');
  }

  function show(el) {
    var text = el.getAttribute('data-tip');
    if (!text) return;
    tip.textContent = text;
    tip.classList.add('show');
    tip.removeAttribute('aria-hidden');

    requestAnimationFrame(function () {
      var r = el.getBoundingClientRect();
      var tr = tip.getBoundingClientRect();
      var margin = 6;
      var pad = 8;
      var x = r.left + r.width / 2 - tr.width / 2;
      var y = r.top - tr.height - margin;
      if (y < pad) y = r.bottom + margin;
      x = Math.max(pad, Math.min(x, window.innerWidth - tr.width - pad));
      tip.style.left = x + 'px';
      tip.style.top = y + 'px';
    });
  }

  grid.addEventListener('mouseover', function (e) {
    var cell = e.target.closest('.day-cell');
    if (cell) show(cell);
  });
  grid.addEventListener('mouseout', function (e) {
    var cell = e.target.closest('.day-cell');
    if (!cell) return;
    var related = e.relatedTarget;
    if (related && cell.contains(related)) return;
    var toCell = related && related.closest && related.closest('.day-cell');
    if (toCell) { show(toCell); return; }
    hide();
  });
  scroll.addEventListener('scroll', hide);
  document.addEventListener('scroll', hide, true);
  window.addEventListener('blur', hide);

  scroll.scrollLeft = 1e9;
})();
</script>
