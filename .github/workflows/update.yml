name: Update contributions

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch contributions
        run: python fetch.py

      - name: Render HTML
        run: python render.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contributions.json index.html
          git diff --staged --quiet || (git commit -m "update contributions $(date -u +%Y-%m-%d)" && git push)
